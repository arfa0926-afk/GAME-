<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION - AUTO SCAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { font-family: 'Orbitron', monospace; background: #000; }
        .glow { box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff0080; }
        .scan-line {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 0, 0.2), transparent);
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-black text-green-500 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md border border-green-700 rounded-lg p-6 bg-gray-900/80 relative overflow-hidden glow">
        <div class="scan-line"></div>
        
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-green-500">ORION 1.0</h1>
            <p class="text-xs text-green-600">[SYSTEM: AUTO_FACE_SCANNER]</p>
        </div>

        <!-- AREA GAMBAR ORANG -->
        <div class="mb-6 border border-green-600 rounded overflow-hidden h-64 relative bg-black">
            <img id="targetImage" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" 
                 class="w-full h-full object-cover"
                 alt="TARGET">
            <div class="absolute top-2 right-2 bg-red-600 text-white text-xs px-2 py-1 rounded">LIVE</div>
        </div>

        <div id="resultBox" class="p-4 rounded bg-black/80 h-48 overflow-y-auto font-mono text-xs">
            <p id="logText">> SISTEM MEMULAI OTOMATIS...</p>
        </div>

    </div>

    <script>
        const logText = document.getElementById('logText');
        const images = [
            "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=500", // Cowok
            "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500", // Cewek
            "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500", // Cowok
            "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=500"  // Cewek
        ];

        // Pilih gambar acak saat dibuka
        window.onload = function() {
            const randomImg = images[Math.floor(Math.random() * images.length)];
            document.getElementById('targetImage').src = randomImg;
            startProcess();
        }

        function log(text, delay) {
            setTimeout(() => {
                logText.innerHTML += `<br>> ${text}`;
                document.getElementById('resultBox').scrollTop = document.getElementById('resultBox').scrollHeight;
            }, delay);
        }

        function startProcess() {
            log("[+] GAMBAR TERDETEKSI...", 1000);
            log("[+] ANALISA WAJAH DIMULAI...", 2000);
            log("[+] MENCOCOKAN DENGAN DATABASE...", 3500);
            log("[+] MENGAMBIL DATA PRIBADI...", 5000);
            log("[+] MENCARI LOKASI...", 6500);

            setTimeout(() => {
                log("<br>================================", 8000);
                log("✅ [DATA BERHASIL DIAMBIL]", 8500);
                log(`👤 NAMA: ${generateName()}`, 9000);
                log(`📍 LOKASI: ${generateLocation()}`, 9500);
                log(`🆔 NO KTP: ${generateID()}`, 10000);
                log(`📱 NO HP: ${generatePhone()}`, 10500);
                log("================================", 11000);
                log("⚠️  DATA SUDAH MASUK SISTEM", 11500);
            }, 7000);
        }

        // FUNCTION BUAT DATA PALING ASLI
        function generateName() {
            const names = ["ANDI SETIAWAN", "SARI MELATI", "BUDI HARTO", "RINA AYU", "DAVID CHRISTIAN", "SITI NURHALIZA"];
            return names[Math.floor(Math.random() * names.length)];
        }
        function generateLocation() {
            const locs = ["JAKARTA SELATAN", "BANDUNG", "SURABAYA", "MEDAN", "MAKASSAR", "YOGYAKARTA"];
            return locs[Math.floor(Math.random() * locs.length)];
        }
        function generateID() {
            return Math.floor(Math.random() * 9000000000000000) + 1000000000000000;
        }
        function generatePhone() {
            return "+628" + Math.floor(Math.random() * 900000000) + 100000000;
        }
    </script>

</body>
</html>
