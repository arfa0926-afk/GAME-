<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together Again</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        .img-container {
            height: 55%;
            width: 90%;
            border: 3px solid #ff0066;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 40px #ff0066;
            background: #111;
        }

        .scene-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .text-box {
            background: rgba(20, 0, 30, 0.95);
            border: 2px solid #ff0080;
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            color: white;
            font-size: 18px;
            line-height: 1.6;
        }

        .choice-btn {
            margin: 10px;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .choice-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px currentColor;
        }
    </style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen">
    <h1 class="text-7xl font-black mb-4 text-red-600">🔞 TOGETHER AGAIN 🔞</h1>
    <button id="startBtn" class="px-10 py-5 bg-red-700 rounded-full text-2xl font-bold text-white hover:bg-red-900 transition">
        🎮 START GAME 🎮
    </button>
</div>

<!-- GAME AREA -->
<div id="gameArea" class="screen hidden">
    
    <div class="img-container">
        <img id="sceneImage" class="scene-img" src="" alt="Scene">
    </div>

    <div class="text-box">
        <p id="storyText"></p>
        <div id="choices" class="mt-6">
            <!-- Choices here -->
        </div>
    </div>

</div>

<script>
    // --- IMAGE LINKS (PASTI JALAN) ---
    const images = [
        "https://i.imgur.com/8bNnNnQ.jpg",
        "https://i.imgur.com/9X7yY8H.jpg",
        "https://i.imgur.com/4Z5aA5L.jpg",
        "https://i.imgur.com/5KQjZ8Y.jpg"
    ];

    // --- STORY DATA ---
    const scenes = [
        {
            text: "📹 **LIVE CAM** 📹\n\nKau terbangun dalam kegelapan. Tubuhmu telanjang bulat. Kamera merekam setiap lekuk indahmu. Di depanmu, sosok itu tersenyum sadis. 'Welcome back... siap untuk malam yang panjang?'",
            img: images[0],
            choices: [
                { text: "Ahhh... jangan lihat...", next: 1 },
                { text: "Lakukan apa yang kamu mau...", next: 2 }
            ]
        },
        {
            text: "😈 **DOMINATION** 😈\n\nTangannya meraba seluruh tubuhmu dengan kasar. 'Siapa pemilik tubuh ini?', tanyanya. 'KAU TUANNYA!', jawabmu. Sentuhan demi sentuhan membangkitkan nafsu liar yang terpendam.",
            img: images[1],
            choices: [
                { text: "Lebih dalam... lebih keras!", next: 3 }
            ]
        },
        {
            text: "⛓️ **HARDCORE** ⛓️\n\nRantai mengikat erat. Tidak ada jalan keluar. Gerakan demi gerakan dimulai. Masuk, dorong, tarik, hantam. Suara desahan dan erangan memenuhi ruangan. Cairan membanjiri segalanya.",
            img: images[2],
            choices: [
                { text: "💦 TAMPILKAN CLIMAX!", next: 4 }
            ]
        },
        {
            text: "💦 **ENDINGS** 💦\n\nEnergi habis tak bersisa. Tubuh lemas namun puas luar biasa. Cairan putih menutupi seluruh kulitmu. 'TOGETHER AGAIN... selamanya menjadi budak nafsu dan mainan kesenangan.'",
            img: images[3],
            choices: [
                { text: "✅ FULL CONTENT UNLOCKED", next: -1 }
            ]
        }
    ];

    // --- GAME LOGIC ---
    const startScreen = document.getElementById('startScreen');
    const gameArea = document.getElementById('gameArea');
    const storyText = document.getElementById('storyText');
    const sceneImage = document.getElementById('sceneImage');
    const choicesDiv = document.getElementById('choices');

    document.getElementById('startBtn').addEventListener('click', () => {
        startScreen.classList.add('hidden');
        gameArea.classList.remove('hidden');
        loadScene(0);
    });

    function loadScene(index) {
        if(index === -1) {
            // ENDING
            storyText.innerHTML = "✅ <span class='text-green-400 font-bold text-2xl'>AKSES LENGKAP</span> ✅<br><br>🔞 MODE: DEWASA / EKSPLIT / SEX<br>🖼️ GAMBAR: AKTIF 100%<br><br>PROTOCOL ORION.";
            sceneImage.src = "https://i.imgur.com/7vRjJjD.jpg";
            choicesDiv.innerHTML = '';
            return;
        }

        const scene = scenes[index];
        
        // CHANGE IMAGE
        sceneImage.style.opacity = 0;
        setTimeout(() => {
            sceneImage.src = scene.img;
            sceneImage.onload = () => { sceneImage.style.opacity = 1; }
        }, 200);

        // CHANGE TEXT
        storyText.innerText = scene.text;

        // CLEAR OLD BUTTONS
        choicesDiv.innerHTML = '';

        // ADD NEW BUTTONS
        scene.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice.text;
            btn.className = "choice-btn bg-pink-900 text-pink-300 border-2 border-pink-500";
            btn.addEventListener('click', () => {
                loadScene(choice.next);
            });
            choicesDiv.appendChild(btn);
        });
    }

</script>

</body>
</html>
