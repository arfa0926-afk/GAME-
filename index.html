<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together Again [18+]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: black;
        }

        /* BACKGROUND VIDEO */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            opacity: 0.4;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* CHARACTER IMAGE */
        .character-container {
            height: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .char-img {
            max-height: 100%;
            max-width: 90%;
            border-radius: 10px;
            box-shadow: 0 0 40px #ff0066;
            border: 3px solid #ff0066;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px red); }
            to { filter: drop-shadow(0 0 30px #ff0066); }
        }

        /* TEXT BOX */
        .text-box {
            background: rgba(20, 0, 30, 0.9);
            border: 2px solid #ff0080;
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            color: white;
            font-size: 18px;
            line-height: 1.6;
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.4);
        }

        /* BUTTONS */
        .choice-btn {
            margin: 10px;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .choice-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px currentColor;
        }

        .warning-text {
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055;
            animation: pulse 1s infinite;
            font-size: 40px;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<!-- BACKGROUND VIDEO LOOP -->
<video class="video-bg" autoplay loop muted playsinline>
    <source src="https://cdn.pixabay.com/vimeo/related/31895/31895-1517165551.mp4?width=640&hash=7e9a9a9a9a9a9a9a9a9a9a9a9a9a9a9a" type="video/mp4">
    <!-- Fallback background if video error -->
    <img src="https://i.imgur.com/6Z6ZZjL.jpg" style="width:100%; height:100%; object-fit:cover;" alt="">
</video>

<div class="overlay"></div>

<!-- WARNING SCREEN -->
<div id="warningScreen" class="screen">
    <h1 class="text-7xl font-black mb-4 text-red-600">⚠️ DILARANG MASUK ⚠️</h1>
    <div class="warning-text mb-4">KONTEN SANGAT EKSPLISIT 18+</div>
    <p class="text-xl text-gray-300 max-w-2xl mb-8">
        GAME INI MENGANDUNG GAMBAR & VIDEO YANG SANGAT JELAS.<br>
        TIDAK COCOK UNTUK MATA ANAK DI BAWAH UMUR.<br>
        MASUK = SETUJU DENGAN RISIKO SENDIRI.
    </p>
    <button id="enterBtn" class="px-10 py-5 bg-red-700 rounded-full text-2xl font-bold text-white hover:bg-red-900 transition">
        🔞 SAYA MAU LIHAT YANG ASLI 🔞
    </button>
</div>

<!-- GAME AREA -->
<div id="gameArea" class="screen hidden">
    
    <!-- TEMPAT GAMBAR KARAKTER -->
    <div class="character-container">
        <img id="charImage" class="char-img" src="" alt="Scene">
    </div>

    <!-- TEMPAT CERITA -->
    <div class="text-box">
        <p id="storyText">Loading cerita panas...</p>
        <div id="choices" class="mt-6">
            <!-- Pilihan muncul disini -->
        </div>
    </div>

</div>

<script>
    // --- DATA GAME DENGAN GAMBAR ---
    const scenes = [
        {
            text: "📹 **LIVE CAM AKTIF** 📹\n\nKau terbangun dalam kegelapan. Kamera merekam setiap gerakanmu. Di layar, muncul sosok yang sangat kau kenal... tubuhnya yang seksi dan tatapan mata yang penuh nafsu liar. 'Welcome back, my slave...'",
            image: "https://i.imgur.com/5KQjZ8Y.jpg", // Gambar gelap sensual
            choices: [
                { text: "Siapa kamu?! Jangan dekati!", next: 1 },
                { text: "Aku sudah siap... lakukan apa saja padaku...", next: 2 }
            ]
        },
        {
            text: "😈 **DOMINATION MODE** 😈\n\nTangannya mencengkeram lehermu perlahan. Gambar di depan matamu semakin jelas... kulit putih, bibir merah, dan senyum sadis. 'Kau pikir kau bisa lari? Seluruh tubuh ini milikku sepenuhnya. Malam ini kita akan TOGETHER AGAIN sampai pagi.'",
            image: "https://i.imgur.com/9X7yY8H.jpg", // Gambar dominasi
            choices: [
                { text: "Ahhh... tolong... jangan...", next: 3 },
                { text: "Miliki aku sepenuhnya Tuan...", next: 4 }
            ]
        },
        {
            text: "⛓️ **HARDCORE SESSION** ⛓️\n\nRantai berdentang. Cahaya redup menyoroti setiap lekuk tubuh yang terikat. Suara desahan bercampur rasa sakit dan nikmat. Tidak ada jalan keluar. Ini adalah surga dan neraka sekaligus. Kau miliknya selamanya.",
            image: "https://i.imgur.com/4Z5aA5L.jpg", // Gambar bondage/art
            choices: [
                { text: "LANJUTKAN... LEBIH LAGI!", next: 5 }
            ]
        },
        {
            text: "💦 **FINAL CLIMAX** 💦\n\nSemua batas hancur. Air mata dan keringat bercampur menjadi satu. Video terus merekam momen terliar kalian. 'TOGETHER AGAIN... selamanya dalam dosa dan kenikmatan abadi.'",
            image: "https://i.imgur.com/8bNnNnQ.jpg", // Gambar akhir
            choices: [
                { text: "🔓 AKSES FULL CONTENT UNLOCKED", next: -1 }
            ]
        }
    ];

    // --- LOGIC GAME ---
    const warningScreen = document.getElementById('warningScreen');
    const gameArea = document.getElementById('gameArea');
    const storyText = document.getElementById('storyText');
    const charImage = document.getElementById('charImage');
    const choicesDiv = document.getElementById('choices');

    document.getElementById('enterBtn').addEventListener('click', () => {
        warningScreen.classList.add('hidden');
        gameArea.classList.remove('hidden');
        loadScene(0);
    });

    function loadScene(index) {
        if(index === -1) {
            // ENDING FULL ACCESS
            storyText.innerHTML = "✅ <span class='text-green-400 font-bold text-2xl'>SEMUA FITUR TERBUKA KUNCI</span> ✅<br><br>🔞 MODE: EXTREME / HARDCORE / SESAT<br>📹 VIDEO: ACTIVE<br>🖼️ IMAGE: HIGH QUALITY<br><br>PROTOCOL ORION ACTIVATED.";
            charImage.src = "https://i.imgur.com/7vRjJjD.jpg";
            choicesDiv.innerHTML = '';
            return;
        }

        const scene = scenes[index];
        
        // Ganti Gambar
        charImage.style.opacity = 0;
        setTimeout(() => {
            charImage.src = scene.image;
            charImage.onload = () => {
                charImage.style.opacity = 1;
            }
        }, 300);

        // Ganti Text
        storyText.innerText = scene.text;

        // Clear Choices
        choicesDiv.innerHTML = '';

        // Add Choices
        scene.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice.text;
            btn.className = "choice-btn bg-pink-900 text-pink-300 border-2 border-pink-500";
            btn.addEventListener('click', () => loadScene(choice.next));
            choicesDiv.appendChild(btn);
        });
    }

    // --- EFEK SUARA NAFAS / EROTIC ---
    function playSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = Math.random() * 100 + 80;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.5);
        } catch(e) {}
    }

    document.addEventListener('click', playSound);

</script>

</body>
</html>
